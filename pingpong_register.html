<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乒乓之家 · 注册</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>html{scroll-padding-top:96px}
:root {
  --jin: #C8A84B;
  --jin-light: #F5EDD0;
  --jin-dark: #7A601A;
  --mu: #4A7C59;
  --mu-light: #D4EAD8;
  --mu-dark: #1E4A2B;
  --shui: #1A3A5C;
  --shui-light: #C8D8EC;
  --shui-dark: #0A1E30;
  --huo: #C0392B;
  --huo-light: #FAD7D2;
  --huo-dark: #7A1A10;
  --tu: #A0522D;
  --tu-light: #EDD5C0;
  --tu-dark: #5C2A10;
  --bg: #0D0D0F;
  --bg2: #16161A;
  --bg3: #1E1E24;
  --text: #EDE8DF;
  --text2: #A8A49C;
  --text3: #6B6860;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(192,57,43,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(26,58,92,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.page { position: relative; z-index: 1; }

/* ── TOP NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--jin) 0%, #E8C878 50%, var(--jin) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo span {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--huo);
  border-radius: 50%;
  margin: 0 4px 1px;
  vertical-align: middle;
  -webkit-text-fill-color: initial;
  background: var(--huo);
}
.nav-step {
  display: flex; gap: 8px; align-items: center;
  font-size: 13px; color: var(--text3);
}
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); border: 1px solid var(--text3);
  transition: all 0.3s;
}
.step-dot.active { background: var(--jin); border-color: var(--jin); }
.step-dot.done { background: var(--mu); border-color: var(--mu); }

/* ── SCREENS ── */
.screen { display: none; animation: fadeIn 0.5s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

/* ── SCREEN 1: REGISTER ── */
.register-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: calc(100vh - 65px);
}
.register-left {
  padding: 60px 48px;
  display: flex; flex-direction: column; justify-content: center;
}
.register-right {
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 60px 48px;
  border-left: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.register-right::before {
  content: '乒乓\A之家';
  white-space: pre;
  font-family: 'Noto Serif SC', serif;
  font-size: 100px; font-weight: 700; line-height: 1.1;
  color: rgba(255,255,255,0.03);
  position: absolute; right: -10px; bottom: 40px;
  letter-spacing: 0.1em;
}

.tag-line {
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--jin); margin-bottom: 12px;
}
h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px; font-weight: 600; line-height: 1.3;
  margin-bottom: 8px;
}
.sub { font-size: 14px; color: var(--text2); margin-bottom: 40px; line-height: 1.7; }

.form-group { margin-bottom: 20px; }
label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.05em; }
input[type=text], input[type=email], input[type=password] {
  width: 100%; padding: 12px 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 15px; font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
input:focus { border-color: var(--jin); box-shadow: 0 0 0 3px rgba(200,168,75,0.12); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--jin-dark) 0%, var(--jin) 100%);
  border: none; border-radius: var(--radius);
  color: #1A1200; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 8px;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.99); }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0; color: var(--text3); font-size: 13px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.btn-third {
  width: 100%; padding: 12px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer;
  transition: border-color 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-third:hover { border-color: var(--text3); color: var(--text); }

/* right side features */
.feature-list { width: 100%; max-width: 320px; }
.feature-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 0; border-bottom: 1px solid var(--border);
}
.feature-item:last-child { border-bottom: none; }
.feature-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.feature-text h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.feature-text p { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* ── SCREEN 2: QUIZ ── */
.quiz-wrap {
  max-width: 760px; margin: 0 auto;
  padding: 48px 24px 80px;
}
.quiz-header { text-align: center; margin-bottom: 48px; }
.quiz-header .tag-line { margin-bottom: 12px; }
.quiz-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 30px; font-weight: 600; margin-bottom: 12px;
}
.quiz-header p { font-size: 14px; color: var(--text2); line-height: 1.7; }

.progress-track {
  width: 100%; height: 3px;
  background: var(--bg3); border-radius: 2px;
  margin-bottom: 40px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--shui), var(--huo));
  transition: width 0.4s ease;
}

.question-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 18px; padding: 36px;
  margin-bottom: 24px;
  animation: qIn 0.4s ease;
}
@keyframes qIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

.q-num { font-size: 12px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 12px; }
.q-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 400; line-height: 1.6; margin-bottom: 28px;
}

.options { display: grid; gap: 12px; }
.option {
  padding: 14px 18px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  font-size: 14px; color: var(--text2); line-height: 1.5;
  transition: all 0.2s; position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 12px;
}
.option::before {
  content: ''; position: absolute; inset: 0;
  background: var(--opt-color, transparent);
  opacity: 0.07; transition: opacity 0.2s;
}
.option:hover { border-color: var(--text3); color: var(--text); transform: translateX(4px); }
.option.selected {
  border-color: var(--opt-color, var(--jin));
  color: var(--text);
  background: var(--bg2);
}
.option.selected::before { opacity: 0.12; }
.opt-tag {
  font-size: 11px; letter-spacing: 0.1em; padding: 2px 8px;
  background: rgba(255,255,255,0.06); border-radius: 20px;
  flex-shrink: 0; color: var(--opt-color);
}

.quiz-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.btn-back {
  padding: 10px 24px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer;
  transition: border-color 0.2s;
}
.btn-back:hover { border-color: var(--text3); color: var(--text); }
.btn-next {
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--jin-dark), var(--jin));
  border: none; border-radius: var(--radius);
  color: #1A1200; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: opacity 0.2s; opacity: 0.4; pointer-events: none;
  letter-spacing: 0.05em;
}
.btn-next.ready { opacity: 1; pointer-events: all; }

/* ── SCREEN 3: RESULT ── */
.result-wrap {
  max-width: 680px; margin: 0 auto;
  padding: 60px 24px 80px; text-align: center;
}
.result-badge {
  width: 120px; height: 120px; margin: 0 auto 28px;
  border-radius: 30px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.result-badge::after {
  content: ''; position: absolute; inset: -3px;
  border-radius: 33px; background: conic-gradient(
    from 0deg,
    var(--badge-c1), var(--badge-c2), var(--badge-c1)
  );
  z-index: -1; animation: spin 6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.badge-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px; font-weight: 700;
  line-height: 1;
}
.badge-label { font-size: 11px; letter-spacing: 0.15em; margin-top: 4px; }

.result-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 32px; font-weight: 600; margin-bottom: 8px;
}
.result-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.7; }

.traits {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 32px;
}
.trait {
  padding: 6px 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; font-size: 13px; color: var(--text2);
}
.trait.highlight { border-color: var(--badge-c1); color: var(--badge-c1); }

.score-bars { margin: 32px 0; }
.score-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.score-name { width: 32px; font-size: 13px; color: var(--text2); text-align: right; font-family: 'Noto Serif SC', serif; }
.bar-track {
  flex: 1; height: 6px; background: var(--bg3); border-radius: 4px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px;
  width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.score-pct { width: 32px; font-size: 12px; color: var(--text3); }

.result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 36px; }
.btn-outline {
  padding: 12px 28px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text2);
  font-size: 14px; font-family: inherit; cursor: pointer;
  transition: border-color 0.2s;
}
.btn-outline:hover { border-color: var(--text3); color: var(--text); }
.btn-go {
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--jin-dark), var(--jin));
  border: none; border-radius: var(--radius);
  color: #1A1200; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 0.05em;
}
.btn-go:hover { opacity: 0.9; }

@media (max-width: 768px) {
  nav { padding: 16px 20px; }
  .register-layout { grid-template-columns: 1fr; }
  .register-right { display: none; }
  .register-left { padding: 36px 24px; }
}
</style>
  <script src="supabase.js"></script>
</head>

<script>
// ── QUESTIONS ──
const questions = [
  {
    text: "在比赛中，你最享受的时刻是什么？",
    opts: [
      { text: "一板快攻，力压对手，直接得分", type: "huo", label: "火" },
      { text: "耐心对拉，等待机会，一击制胜", type: "tu", label: "土" },
      { text: "灵活移动，变化多端，让对手摸不准", type: "shui", label: "水" },
      { text: "精准控制，稳稳拿下每一个关键分", type: "jin", label: "金" },
      { text: "全力防守，将对手每一次强攻化解", type: "mu", label: "木" },
    ]
  },
  {
    text: "对你来说，乒乓球最迷人的是什么？",
    opts: [
      { text: "那一瞬间爆发的力量与速度感", type: "huo", label: "火" },

let current = 0;
let answers = {};
let scores = { huo: 0, tu: 0, shui: 0, jin: 0, mu: 0 };

function renderQ() {
  const q = questions[current];
  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="q-num">第 ${current+1} 题 / 共 ${questions.length} 题</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.opts.map((o, i) => `
          <div class="option ${answers[current]===i?'selected':''}"
               style="--opt-color: var(--${o.type})"
               onclick="selectOpt(${i}, '${o.type}')">
            <span class="opt-tag">${o.label}</span>
            ${o.text}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('quiz-progress').style.width = ((current+1)/questions.length*100)+'%';
  document.getElementById('btn-back').style.visibility = current > 0 ? 'visible' : 'hidden';
  const next = document.getElementById('btn-next');
  next.textContent = current === questions.length-1 ? '查看结果 ✦' : '下一题 →';
  next.classList.toggle('ready', answers[current] !== undefined);
}

function selectOpt(i, type) {
  answers[current] = i;
  const old = answers[current+'_type'];
  if (old) scores[old] = Math.max(0, scores[old]-1);
  answers[current+'_type'] = type;
  scores[type]++;
  renderQ();
}

function nextQ() {
  if (answers[current] === undefined) return;
  if (current < questions.length-1) {
    current++;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function goToQuiz() {
  const nick  = document.getElementById('nickname');
  const email = document.getElementById('email');
  const pw    = document.getElementById('password');

  // 清旧错误
  [nick, email, pw].forEach(el => {
    el.style.borderColor = ''; el.style.boxShadow = '';
    el.parentNode.querySelector('.fv-err')?.remove();
  });

  let valid = true;
  function markErr(el, msg) {
    el.style.borderColor = 'var(--huo)';
    el.style.boxShadow   = '0 0 0 3px rgba(192,57,43,.15)';
    const d = document.createElement('div');
    d.className = 'fv-err';
    d.style.cssText = 'font-size:12px;color:#E86060;margin-top:5px;';
    d.textContent = msg; el.parentNode.appendChild(d);
    valid = false;
  }

  if (!nick.value.trim())               markErr(nick,  '请填写昵称');
  else if (nick.value.trim().length>32) markErr(nick,  '昵称最多32个字');

  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!email.value.trim())  markErr(email, '请填写邮箱');
  else if (!re.test(email.value)) markErr(email, '邮箱格式不正确');

  if (!pw.value)            markErr(pw, '请设置密码');
  else if (pw.value.length < 6) markErr(pw, '密码至少6位');

  if (!valid) return;

  // 暂存注册信息，完成测定后再提交
  sessionStorage.setItem('reg_email',    email.value.trim());
  sessionStorage.setItem('reg_password', pw.value);
  sessionStorage.setItem('reg_nickname', nick.value.trim());
  sessionStorage.setItem('reg_city',     (document.getElementById('city')?.value||'').trim());

  switchScreen(1);
  renderQ();
}

function showResult() {
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const t = types[winner];
  switchScreen(2);
  document.getElementById('result-badge').style.cssText +=
    `--badge-c1:${t.color};--badge-c2:${t.color2};background:${t.color}22;`;
  document.getElementById('badge-char').textContent = t.char;
  document.getElementById('badge-char').style.color = t.color;
  document.getElementById('badge-label').textContent = t.name;
  document.getElementById('badge-label').style.color = t.color;
  document.getElementById('result-name').textContent = t.name;
  document.getElementById('result-sub').textContent = t.sub;

  const traitsEl = document.getElementById('result-traits');
  traitsEl.innerHTML = t.traits.map((tr,i) =>
    `<span class="trait ${i===0?'highlight':''}" style="${i===0?'--badge-c1:'+t.color+'':'color:var(--text2)'}">${tr}</span>`
  ).join('');

  const total = questions.length;
  const barsEl = document.getElementById('score-bars');
  const typeOrder = ['huo','tu','shui','jin','mu'];
  barsEl.innerHTML = typeOrder.map(k => {
    const tp = types[k];
    const pct = Math.round(scores[k]/total*100);
    return `
      <div class="score-row">
        <div class="score-name" style="color:${tp.color}">${tp.char}</div>
        <div class="bar-track">
          <div class="bar-fill" id="bar-${k}" style="background:${tp.color};width:0%"></div>
        </div>
        <div class="score-pct">${pct}%</div>
      </div>
    `;
  }).join('');

  setTimeout(() => {
    typeOrder.forEach(k => {
      const pct = Math.round(scores[k]/total*100);
      document.getElementById('bar-'+k).style.width = pct+'%';
    });
  }, 100);
}

function switchScreen(idx) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.step-dot').forEach((d,i) => {
    d.classList.toggle('done', i < idx);
    d.classList.toggle('active', i === idx);
  });
  document.getElementById('screen'+(idx+1)).classList.add('active');
  const labels = ['注册账号','五行测定','测定结果'];
  document.getElementById('step-label').textContent = labels[idx];
}

function retake() {
  current = 0; answers = {}; scores = {huo:0,tu:0,shui:0,jin:0,mu:0};
  switchScreen(1); renderQ();
}
async function goHome() {
  const btn = document.querySelector('#screen3 .btn-go');
  if (btn) { btn.textContent = '注册中…'; btn.disabled = true; }

  const email    = sessionStorage.getItem('reg_email');
  const password = sessionStorage.getItem('reg_password');
  const nickname = sessionStorage.getItem('reg_nickname');
  const city     = sessionStorage.getItem('reg_city');

  // 获取测定结果
  const el = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

  try {
    // 等 Supabase 就绪
    if (!window.sb) {
      await new Promise(r => document.addEventListener('supabase-ready', r, {once:true}));
    }

    await Auth.signUp(email, password, nickname, city);

    // 登录后保存五行测定结果
    const { data: { session } } = await window.sb.auth.getSession();
    if (session?.user) {
      await window.sb.from('users').update({
        element:        el,
        element_scores: scores,
      }).eq('id', session.user.id);
    }

    // 清理 sessionStorage
    ['reg_email','reg_password','reg_nickname','reg_city'].forEach(k => sessionStorage.removeItem(k));

    location.href = 'pingpong_level.html';

  } catch (err) {
    const msg = window.handleError ? window.handleError(err) : (err.message || '注册失败');
    if (btn) { btn.textContent = '进入主页 →'; btn.disabled = false; }
    alert('注册失败：' + msg);
  }
}
